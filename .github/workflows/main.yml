name: PHP app

on: 
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout actions
        uses: actions/checkout@v6.0.2

      - name: setup php
        uses: nanasess/setup-php@v4.0.2
        with:
          node-version: 8.3.0

      - name: install dependencies
        run: npm install

      - name: build
        run: npm run build
